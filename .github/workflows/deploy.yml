name: Notify Slack on Push

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack
        run: |
          curl -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer ${{ secrets.SLACK_BOT_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "channel": "a-project",
              "text": ":rocket: *New commit pushed to main*\nAuthor: ${{ github.actor }}\nMessage: ${{ github.event.head_commit.message }}"
            }'
