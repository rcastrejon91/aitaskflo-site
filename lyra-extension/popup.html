<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 300px;
    background: #080810;
    color: #f1f5f9;
    font-family: system-ui, -apple-system, sans-serif;
    padding: 20px;
  }

  .header {
    display: flex; align-items: center; gap: 10px; margin-bottom: 20px;
  }
  .logo {
    width: 32px; height: 32px; border-radius: 10px;
    background: linear-gradient(135deg, #8b5cf6, #ec4899);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .title { font-weight: 700; font-size: 15px; }
  .subtitle { color: rgba(255,255,255,0.4); font-size: 11px; }

  .status {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 14px; border-radius: 12px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    margin-bottom: 16px; font-size: 12px;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #4ade80; flex-shrink: 0;
    animation: pulse 2s infinite;
  }
  .dot.off { background: #475569; animation: none; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  label {
    display: block; font-size: 11px; color: rgba(255,255,255,0.4);
    text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 5px;
  }
  input {
    width: 100%; background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
    color: #f1f5f9; font-size: 12px; padding: 8px 10px;
    outline: none; margin-bottom: 12px;
    font-family: monospace;
  }
  input:focus { border-color: rgba(139,92,246,0.6); }

  .btn {
    width: 100%; padding: 10px; border-radius: 10px; border: none;
    font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s;
  }
  .btn-primary {
    background: linear-gradient(135deg, #8b5cf6, #7c3aed);
    color: white;
  }
  .btn-primary:hover { opacity: 0.9; }
  .btn-stop {
    background: rgba(239,68,68,0.15); color: #f87171;
    border: 1px solid rgba(239,68,68,0.3); margin-top: 8px;
  }
  .btn-stop:hover { background: rgba(239,68,68,0.25); }

  .help {
    margin-top: 14px; padding: 10px; border-radius: 10px;
    background: rgba(139,92,246,0.08); border: 1px solid rgba(139,92,246,0.2);
    font-size: 11px; color: rgba(255,255,255,0.5); line-height: 1.6;
  }
  .help a { color: #a78bfa; text-decoration: none; }
  .msg { font-size: 11px; color: #4ade80; margin-top: 8px; text-align: center; min-height: 16px; }
</style>
</head>
<body>
<div class="header">
  <div class="logo">✦</div>
  <div>
    <div class="title">Lyra Agent</div>
    <div class="subtitle">Browser control</div>
  </div>
</div>

<div class="status">
  <div class="dot" id="dot"></div>
  <span id="statusText">Checking…</span>
</div>

<label>Server URL</label>
<input id="serverUrl" type="text" placeholder="https://aitaskflo.com" />

<label>Your User ID</label>
<input id="userId" type="text" placeholder="Paste from /account page" />

<label>Agent Key</label>
<input id="agentKey" type="password" placeholder="Paste from /account page" />

<button class="btn btn-primary" id="saveBtn">Connect Lyra</button>
<button class="btn btn-stop" id="stopBtn" style="display:none">Stop Agent</button>

<div class="msg" id="msg"></div>

<div class="help">
  Get your User ID and Agent Key from your
  <a href="https://aitaskflo.com/account" target="_blank">account page</a>.<br/>
  Once connected, Lyra can control this browser.
</div>

<script src="popup.js"></script>
</body>
</html>
